<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGradient" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative geometric pattern -->
  <circle cx="120" cy="120" r="100" fill="#16213e" opacity="0.1"/>
  <polygon points="950,100 1000,200 900,200" fill="#16213e" opacity="0.08"/>
  <rect x="600" y="450" width="200" height="200" fill="#16213e" opacity="0.05" transform="rotate(30 700 550)"/>

  <!-- Pyramid vs Network Icon -->
  <g transform="translate(880, 160)">
    <!-- Pyramid (left) -->
    <polygon points="-45,-25 -25,20 -65,20" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="-45" cy="-25" r="3" fill="#ff6b6b"/>
    <circle cx="-35" cy="0" r="2.5" fill="#ff6b6b"/>
    <circle cx="-55" cy="0" r="2.5" fill="#ff6b6b"/>
    <circle cx="-25" cy="20" r="2" fill="#ff6b6b"/>
    <circle cx="-65" cy="20" r="2" fill="#ff6b6b"/>

    <!-- Network (right) -->
    <circle cx="45" cy="-10" r="4" fill="#51cf66"/>
    <circle cx="25" cy="10" r="4" fill="#51cf66"/>
    <circle cx="65" cy="10" r="4" fill="#51cf66"/>
    <circle cx="35" cy="30" r="4" fill="#51cf66"/>
    <circle cx="55" cy="30" r="4" fill="#51cf66"/>
    <g stroke="#51cf66" stroke-width="1.5" opacity="0.7">
      <line x1="45" y1="-10" x2="25" y2="10"/>
      <line x1="45" y1="-10" x2="65" y2="10"/>
      <line x1="25" y1="10" x2="35" y2="30"/>
      <line x1="25" y1="10" x2="55" y2="30"/>
      <line x1="65" y1="10" x2="35" y2="30"/>
      <line x1="65" y1="10" x2="55" y2="30"/>
    </g>
  </g>

  <!-- VS Label -->
  <text x="900" y="235" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#16213e" opacity="0.7">
    VS
  </text>

  <!-- Main Title -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    MLM vs Pyramide
  </text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    de Ponzi
  </text>

  <!-- Decorative line -->
  <line x1="300" y1="400" x2="900" y2="400" stroke="#16213e" stroke-width="2" opacity="0.5"/>

  <!-- Branding -->
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="end" fill="#16213e" opacity="0.8">
    MLM DÉCRYPTÉ
  </text>
</svg>