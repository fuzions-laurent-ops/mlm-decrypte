<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGradient" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative geometric pattern -->
  <circle cx="950" cy="80" r="100" fill="#16213e" opacity="0.1"/>
  <rect x="50" y="500" width="250" height="250" fill="#16213e" opacity="0.05" transform="rotate(-25 175 625)"/>

  <!-- Scales of Justice + France Flag Icon -->
  <g transform="translate(880, 160)">
    <!-- Scales base -->
    <rect x="-2" y="30" width="4" height="25" fill="#16213e"/>
    <polygon points="-2,30 2,30 0,20" fill="#16213e"/>

    <!-- Beam -->
    <rect x="-35" y="30" width="70" height="3" rx="1.5" fill="#16213e"/>

    <!-- Left pan (France colors) -->
    <rect x="-45" y="38" width="18" height="12" rx="2" fill="#002395" stroke="#16213e" stroke-width="1.5"/>
    <text x="-36" y="46" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">FR</text>

    <!-- Right pan (Scales/Legal) -->
    <rect x="27" y="38" width="18" height="12" rx="2" fill="#51cf66" stroke="#16213e" stroke-width="1.5"/>
    <text x="36" y="46" font-family="Arial" font-size="12" font-weight="bold" fill="#16213e" text-anchor="middle">✓</text>

    <!-- Balance indicator -->
    <circle cx="0" cy="28" r="2" fill="#51cf66"/>

    <!-- Decorative law book -->
    <rect x="-30" y="-10" width="12" height="15" rx="1" fill="#1a1a2e" stroke="#16213e" stroke-width="1.5"/>
    <line x1="-24" y1="-5" x2="-20" y2="-5" stroke="#ffd700" stroke-width="1" opacity="0.7"/>
    <line x1="-24" y1="0" x2="-20" y2="0" stroke="#ffd700" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    Le MLM est-il légal
  </text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    en France ?
  </text>

  <!-- Decorative line -->
  <line x1="300" y1="400" x2="900" y2="400" stroke="#002395" stroke-width="2" opacity="0.5"/>

  <!-- Branding -->
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="end" fill="#16213e" opacity="0.8">
    MLM DÉCRYPTÉ
  </text>
</svg>