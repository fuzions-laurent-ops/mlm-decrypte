<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGradient" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative geometric pattern -->
  <circle cx="950" cy="100" r="90" fill="#16213e" opacity="0.1"/>
  <rect x="50" y="450" width="280" height="280" fill="#16213e" opacity="0.05" transform="rotate(-30 190 590)"/>

  <!-- Speech Bubbles/Reputation Icon -->
  <g transform="translate(880, 160)">
    <!-- Main bubble (center) -->
    <ellipse cx="0" cy="0" rx="25" ry="20" fill="#ff6b6b" stroke="#16213e" stroke-width="2"/>
    <polygon points="20,-5 30,5 20,10" fill="#ff6b6b"/>
    <!-- Warning text inside -->
    <text x="0" y="8" font-family="Arial" font-size="24" font-weight="bold" fill="#16213e" text-anchor="middle">!</text>

    <!-- Surrounding negative bubbles -->
    <circle cx="-45" cy="-30" r="12" fill="#ffd700" stroke="#16213e" stroke-width="1.5" opacity="0.8"/>
    <circle cx="45" cy="-35" r="12" fill="#ffd700" stroke="#16213e" stroke-width="1.5" opacity="0.8"/>
    <circle cx="-50" cy="25" r="12" fill="#ffd700" stroke="#16213e" stroke-width="1.5" opacity="0.8"/>
    <circle cx="50" cy="30" r="12" fill="#ffd700" stroke="#16213e" stroke-width="1.5" opacity="0.8"/>

    <!-- Connection lines -->
    <g stroke="#ff6b6b" stroke-width="1.5" opacity="0.5">
      <line x1="-15" y1="-12" x2="-35" y2="-25"/>
      <line x1="15" y1="-15" x2="33" y2="-28"/>
      <line x1="-20" y1="15" x2="-38" y2="22"/>
      <line x1="20" y1="18" x2="38" y2="26"/>
    </g>

    <!-- Minus signs in outer bubbles -->
    <text x="-45" y="-26" font-family="Arial" font-size="16" font-weight="bold" fill="#16213e" text-anchor="middle">-</text>
    <text x="45" y="-31" font-family="Arial" font-size="16" font-weight="bold" fill="#16213e" text-anchor="middle">-</text>
    <text x="-50" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#16213e" text-anchor="middle">-</text>
    <text x="50" y="35" font-family="Arial" font-size="16" font-weight="bold" fill="#16213e" text-anchor="middle">-</text>
  </g>

  <!-- Main Title -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    Pourquoi le MLM a
  </text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    mauvaise réputation
  </text>

  <!-- Decorative line -->
  <line x1="250" y1="400" x2="950" y2="400" stroke="#16213e" stroke-width="2" opacity="0.5"/>

  <!-- Branding -->
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="end" fill="#16213e" opacity="0.8">
    MLM DÉCRYPTÉ
  </text>
</svg>