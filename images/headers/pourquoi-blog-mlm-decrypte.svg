<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGradient" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative geometric pattern -->
  <circle cx="150" cy="100" r="80" fill="#16213e" opacity="0.1"/>
  <circle cx="1050" cy="530" r="120" fill="#16213e" opacity="0.1"/>
  <rect x="50" y="400" width="250" height="250" fill="#16213e" opacity="0.05" transform="rotate(45 175 525)"/>

  <!-- Lightbulb Icon -->
  <g transform="translate(900, 150)">
    <!-- Bulb -->
    <path d="M -20 0 Q -30 10 -30 25 Q -30 45 -15 50 L 15 50 Q 30 45 30 25 Q 30 10 20 0 Q 10 -10 0 -10 Q -10 -10 -20 0 Z" fill="#ffd700" stroke="#16213e" stroke-width="2"/>
    <!-- Filament -->
    <path d="M -8 20 Q 0 30 8 20" fill="none" stroke="#16213e" stroke-width="1.5"/>
    <!-- Base -->
    <rect x="-25" y="50" width="50" height="8" rx="2" fill="#16213e"/>
    <rect x="-20" y="58" width="40" height="5" rx="1" fill="#16213e"/>
    <!-- Glow -->
    <circle cx="0" cy="20" r="35" fill="#ffd700" opacity="0.2"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    Pourquoi ce blog
  </text>
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    MLM Décrypté
  </text>

  <!-- Decorative line -->
  <line x1="350" y1="380" x2="850" y2="380" stroke="#16213e" stroke-width="2" opacity="0.5"/>

  <!-- Branding -->
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="end" fill="#16213e" opacity="0.8">
    MLM DÉCRYPTÉ
  </text>
</svg>