<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGradient" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative geometric pattern -->
  <circle cx="120" cy="100" r="95" fill="#16213e" opacity="0.1"/>
  <polygon points="950,550 1050,500 1000,600" fill="#16213e" opacity="0.08"/>

  <!-- Checklist/Beginner Icon -->
  <g transform="translate(880, 160)">
    <!-- Clipboard -->
    <rect x="-20" y="-25" width="40" height="60" rx="3" fill="none" stroke="#16213e" stroke-width="2"/>
    <rect x="-18" y="-23" width="36" height="8" rx="2" fill="#16213e"/>

    <!-- Checklist items -->
    <g>
      <!-- Item 1 - unchecked -->
      <rect x="-15" y="-10" width="14" height="6" rx="1" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
      <line x1="-10" y1="-2" x2="2" y2="-2" stroke="#ff6b6b" stroke-width="0.8" opacity="0.5"/>

      <!-- Item 2 - unchecked -->
      <rect x="-15" y="2" width="14" height="6" rx="1" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
      <line x1="-10" y1="10" x2="2" y2="10" stroke="#ff6b6b" stroke-width="0.8" opacity="0.5"/>

      <!-- Item 3 - checked -->
      <rect x="-15" y="14" width="14" height="6" rx="1" fill="#51cf66" stroke="#16213e" stroke-width="1.5"/>
      <path d="M -10 16 L -6 20 L 2 12" stroke="#16213e" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Item 4 - unchecked -->
      <rect x="-15" y="26" width="14" height="6" rx="1" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
      <line x1="-10" y1="34" x2="2" y2="34" stroke="#ff6b6b" stroke-width="0.8" opacity="0.5"/>
    </g>

    <!-- Warning icon near checklist -->
    <circle cx="30" cy="-10" r="12" fill="#ffd700" stroke="#16213e" stroke-width="1.5" opacity="0.8"/>
    <text x="30" y="-5" font-family="Arial" font-size="18" font-weight="bold" fill="#16213e" text-anchor="middle">!</text>
  </g>

  <!-- Main Title -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    Les erreurs classiques
  </text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    du débutant
  </text>

  <!-- Decorative line -->
  <line x1="300" y1="400" x2="900" y2="400" stroke="#16213e" stroke-width="2" opacity="0.5"/>

  <!-- Branding -->
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="end" fill="#16213e" opacity="0.8">
    MLM DÉCRYPTÉ
  </text>
</svg>