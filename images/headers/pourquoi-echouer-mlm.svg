<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGradient" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative geometric pattern -->
  <rect x="50" y="50" width="220" height="220" fill="#16213e" opacity="0.08" transform="rotate(30 160 160)"/>
  <circle cx="1000" cy="550" r="105" fill="#16213e" opacity="0.1"/>

  <!-- Obstacles/Hurdles Icon -->
  <g transform="translate(880, 170)">
    <!-- Track/ground line -->
    <line x1="-50" y1="35" x2="50" y2="35" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>

    <!-- Hurdles -->
    <g fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round">
      <!-- First hurdle -->
      <line x1="-35" y1="35" x2="-35" y2="15"/>
      <line x1="-40" y1="15" x2="-30" y2="15"/>

      <!-- Second hurdle -->
      <line x1="-10" y1="35" x2="-10" y2="5"/>
      <line x1="-15" y1="5" x2="-5" y2="5"/>

      <!-- Third hurdle -->
      <line x1="15" y1="35" x2="15" y2="10"/>
      <line x1="10" y1="10" x2="20" y2="10"/>

      <!-- Fourth hurdle -->
      <line x1="40" y1="35" x2="40" y2="20"/>
      <line x1="35" y1="20" x2="45" y2="20"/>
    </g>

    <!-- Falling figure -->
    <circle cx="-55" cy="-15" r="5" fill="#ff6b6b"/>
    <line x1="-55" y1="-10" x2="-55" y2="5" stroke="#ff6b6b" stroke-width="2"/>
    <line x1="-60" y1="-5" x2="-50" y2="0" stroke="#ff6b6b" stroke-width="2"/>
    <line x1="-58" y1="5" x2="-52" y2="15" stroke="#ff6b6b" stroke-width="2"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    Pourquoi la plupart
  </text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    échouent en MLM
  </text>

  <!-- Decorative line -->
  <line x1="250" y1="400" x2="950" y2="400" stroke="#ff6b6b" stroke-width="2" opacity="0.5"/>

  <!-- Branding -->
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="end" fill="#16213e" opacity="0.8">
    MLM DÉCRYPTÉ
  </text>
</svg>