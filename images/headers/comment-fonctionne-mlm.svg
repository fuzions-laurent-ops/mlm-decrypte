<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGradient" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative geometric pattern -->
  <circle cx="1100" cy="80" r="100" fill="#16213e" opacity="0.1"/>
  <circle cx="80" cy="550" r="90" fill="#16213e" opacity="0.1"/>
  <polygon points="100,100 200,50 300,100 250,200 200,250 100,200" fill="#16213e" opacity="0.05"/>

  <!-- Network/Gears Icon -->
  <g transform="translate(880, 180)">
    <!-- Central gear -->
    <circle cx="0" cy="0" r="18" fill="#16213e"/>
    <circle cx="0" cy="0" r="15" fill="url(#bgGradient)"/>
    <!-- Gear teeth -->
    <g stroke="#16213e" stroke-width="2" fill="none">
      <path d="M 0,-18 L 0,-28 M 0,18 L 0,28 M 18,0 L 28,0 M -18,0 L -28,0"/>
    </g>
    <!-- Nodes -->
    <circle cx="-35" cy="-20" r="12" fill="#1a9fff" stroke="#16213e" stroke-width="1.5"/>
    <circle cx="35" cy="-20" r="12" fill="#1a9fff" stroke="#16213e" stroke-width="1.5"/>
    <circle cx="-35" cy="20" r="12" fill="#1a9fff" stroke="#16213e" stroke-width="1.5"/>
    <circle cx="35" cy="20" r="12" fill="#1a9fff" stroke="#16213e" stroke-width="1.5"/>
    <!-- Connection lines -->
    <g stroke="#1a9fff" stroke-width="2" opacity="0.6">
      <line x1="-15" y1="-10" x2="-25" y2="-15"/>
      <line x1="15" y1="-10" x2="25" y2="-15"/>
      <line x1="-15" y1="10" x2="-25" y2="15"/>
      <line x1="15" y1="10" x2="25" y2="15"/>
    </g>
  </g>

  <!-- Main Title -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    Comment fonctionne
  </text>
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    vraiment le MLM ?
  </text>

  <!-- Decorative line -->
  <line x1="300" y1="380" x2="900" y2="380" stroke="#1a9fff" stroke-width="2" opacity="0.5"/>

  <!-- Branding -->
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="end" fill="#16213e" opacity="0.8">
    MLM DÉCRYPTÉ
  </text>
</svg>