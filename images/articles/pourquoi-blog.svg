<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7e22ce;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots7" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad7)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots7)"/>

  <!-- Pen/Quill and Lightbulb -->
  <g opacity="0.9">
    <!-- Lightbulb -->
    <g transform="translate(320, 180)">
      <!-- Bulb -->
      <circle cx="0" cy="0" r="35" fill="none" stroke="#ffffff" stroke-width="3"/>
      <!-- Filament -->
      <path d="M -10 -15 Q 0 -5 10 -15" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Base -->
      <rect x="-12" y="25" width="24" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <!-- Thread -->
      <rect x="-8" y="37" width="16" height="3" rx="1" fill="#ffffff"/>
      <rect x="-8" y="42" width="16" height="3" rx="1" fill="#ffffff"/>
    </g>

    <!-- Pen/Quill -->
    <g transform="translate(520, 200)">
      <!-- Tip -->
      <path d="M 0 50 L -8 20 L 0 15 L 8 20 Z" fill="#ffffff"/>
      <!-- Shaft -->
      <line x1="0" y1="15" x2="0" y2="-45" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
      <!-- Grip -->
      <line x1="0" y1="-35" x2="0" y2="-15" stroke="#ffffff" stroke-width="5" opacity="0.7" stroke-linecap="round"/>
      <!-- Feather marks -->
      <path d="M -12 -30 Q -20 -25 -15 -20" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <path d="M 12 -30 Q 20 -25 15 -20" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
</svg>