<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots2" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad2)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots2)"/>

  <!-- Network nodes -->
  <g opacity="0.9">
    <!-- Central node -->
    <circle cx="400" cy="225" r="35" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>

    <!-- Connection lines -->
    <line x1="400" y1="225" x2="280" y2="150" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="400" y1="225" x2="520" y2="150" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="400" y1="225" x2="280" y2="300" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="400" y1="225" x2="520" y2="300" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="400" y1="225" x2="180" y2="225" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="400" y1="225" x2="620" y2="225" stroke="#ffffff" stroke-width="2.5"/>

    <!-- Peripheral nodes -->
    <circle cx="280" cy="150" r="24" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="520" cy="150" r="24" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="280" cy="300" r="24" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="520" cy="300" r="24" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="180" cy="225" r="24" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="620" cy="225" r="24" fill="none" stroke="#ffffff" stroke-width="2.5"/>

    <!-- Center dots for nodes -->
    <circle cx="280" cy="150" r="4" fill="#ffffff"/>
    <circle cx="520" cy="150" r="4" fill="#ffffff"/>
    <circle cx="280" cy="300" r="4" fill="#ffffff"/>
    <circle cx="520" cy="300" r="4" fill="#ffffff"/>
    <circle cx="180" cy="225" r="4" fill="#ffffff"/>
    <circle cx="620" cy="225" r="4" fill="#ffffff"/>
  </g>
</svg>