<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots8" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad8)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots8)"/>

  <!-- Warning Triangle and Shield -->
  <g opacity="0.9">
    <!-- Warning Triangle -->
    <g transform="translate(300, 180)">
      <!-- Triangle -->
      <path d="M 0 -60 L 60 50 L -60 50 Z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
      <!-- Exclamation mark -->
      <circle cx="0" cy="15" r="6" fill="#ffffff"/>
      <rect x="-3" y="-20" width="6" height="30" rx="3" fill="#ffffff"/>
    </g>

    <!-- Shield -->
    <g transform="translate(520, 180)">
      <!-- Shield shape -->
      <path d="M 0 -50 L -45 -30 L -45 15 Q 0 55 0 55 Q 0 55 45 15 L 45 -30 Z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
      <!-- Exclamation mark inside shield -->
      <circle cx="0" cy="10" r="5" fill="#ffffff"/>
      <rect x="-2.5" y="-15" width="5" height="22" rx="2.5" fill="#ffffff"/>
    </g>
  </g>
</svg>