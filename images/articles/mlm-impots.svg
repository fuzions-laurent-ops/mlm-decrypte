<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots9" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad9)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots9)"/>

  <!-- Document and Calculator -->
  <g opacity="0.9">
    <!-- Document -->
    <g transform="translate(280, 160)">
      <!-- Paper -->
      <rect x="-40" y="-50" width="80" height="140" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
      <!-- Lines -->
      <line x1="-30" y1="-30" x2="30" y2="-30" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-30" y1="10" x2="30" y2="10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-30" y1="30" x2="30" y2="30" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <!-- Euro symbol -->
      <text x="0" y="65" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">€</text>
    </g>

    <!-- Calculator -->
    <g transform="translate(520, 160)">
      <!-- Body -->
      <rect x="-50" y="-50" width="100" height="140" rx="6" fill="none" stroke="#ffffff" stroke-width="3"/>
      <!-- Display -->
      <rect x="-35" y="-35" width="70" height="25" rx="3" fill="none" stroke="#ffffff" stroke-width="2"/>
      <!-- Buttons grid -->
      <rect x="-35" y="0" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="-15" y="0" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="5" y="0" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="25" y="0" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>

      <rect x="-35" y="20" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="-15" y="20" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="5" y="20" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="25" y="20" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>

      <rect x="-35" y="40" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="-15" y="40" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="5" y="40" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="25" y="40" width="15" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    </g>
  </g>
</svg>