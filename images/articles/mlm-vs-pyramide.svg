<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots1" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad1)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots1)"/>

  <!-- Left scale (legitimate) -->
  <g opacity="0.9">
    <!-- Scale beam -->
    <line x1="250" y1="200" x2="350" y2="200" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <!-- Fulcrum -->
    <path d="M 300 200 L 280 240 L 320 240 Z" fill="#ffffff"/>
    <!-- Left pan -->
    <rect x="210" y="160" width="80" height="50" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
    <!-- Right pan -->
    <rect x="310" y="160" width="80" height="50" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
    <!-- Balance indicator (level) -->
    <circle cx="300" cy="195" r="6" fill="#ffffff"/>
  </g>

  <!-- Right triangle (pyramid) -->
  <g opacity="0.9">
    <!-- Legitimate pyramid (balanced) -->
    <path d="M 500 150 L 450 280 L 550 280 Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <line x1="500" y1="150" x2="500" y2="280" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="450" y1="215" x2="550" y2="215" stroke="#ffffff" stroke-width="2" opacity="0.5"/>

    <!-- Inverted pyramid (illegitimate) -->
    <path d="M 650 280 L 600 150 L 700 150 Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" stroke-dasharray="5,5"/>
    <line x1="650" y1="280" x2="650" y2="150" stroke="#ffffff" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
  </g>
</svg>