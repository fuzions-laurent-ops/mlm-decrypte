<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots4" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad4)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots4)"/>

  <!-- Crossroads/Fork -->
  <g opacity="0.9">
    <!-- Road -->
    <path d="M 400 380 L 400 150" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

    <!-- Left fork -->
    <path d="M 400 150 L 280 50" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

    <!-- Right fork -->
    <path d="M 400 150 L 520 50" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

    <!-- Question mark -->
    <text x="400" y="220" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">?</text>

    <!-- Left direction indicator -->
    <circle cx="280" cy="50" r="18" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="270" y1="40" x2="290" y2="60" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="290" y1="40" x2="270" y2="60" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <!-- Right direction indicator -->
    <circle cx="520" cy="50" r="18" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <path d="M 510 35 L 520 50 L 530 35" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>