<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots10" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad10)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots10)"/>

  <!-- Speech Bubble and Broken Trust -->
  <g opacity="0.9">
    <!-- Speech Bubble -->
    <g transform="translate(280, 180)">
      <!-- Bubble -->
      <rect x="-45" y="-35" width="90" height="70" rx="6" fill="none" stroke="#ffffff" stroke-width="3"/>
      <!-- Tail -->
      <path d="M -20 35 L -40 60 L -25 40" fill="#ffffff"/>
      <!-- Lines inside -->
      <line x1="-35" y1="-15" x2="35" y2="-15" stroke="#ffffff" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
      <line x1="-35" y1="0" x2="35" y2="0" stroke="#ffffff" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
      <line x1="-35" y1="15" x2="15" y2="15" stroke="#ffffff" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    </g>

    <!-- Broken Chain/Trust -->
    <g transform="translate(520, 180)">
      <!-- Left chain links -->
      <circle cx="-30" cy="-15" r="12" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <circle cx="-30" cy="15" r="12" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <!-- Right chain links -->
      <circle cx="30" cy="-15" r="12" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <circle cx="30" cy="15" r="12" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <!-- Connecting lines (broken) -->
      <line x1="-18" y1="-15" x2="10" y2="-15" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="3,3"/>
      <line x1="-18" y1="15" x2="10" y2="15" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="3,3"/>
      <!-- Vertical connectors -->
      <line x1="-30" y1="-3" x2="-30" y2="3" stroke="#ffffff" stroke-width="2.5"/>
      <line x1="30" y1="-3" x2="30" y2="3" stroke="#ffffff" stroke-width="2.5"/>
      <!-- Break indicator (X) -->
      <line x1="5" y1="-20" x2="15" y2="-10" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="15" y1="-20" x2="5" y2="-10" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>