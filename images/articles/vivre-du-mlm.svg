<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots6" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad6)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots6)"/>

  <!-- Bar Chart -->
  <g opacity="0.9">
    <!-- Baseline -->
    <line x1="250" y1="300" x2="550" y2="300" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <!-- Bar 1 -->
    <rect x="270" y="240" width="40" height="60" rx="4" fill="#ffffff"/>
    <text x="290" y="320" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">2024</text>

    <!-- Bar 2 (taller) -->
    <rect x="330" y="180" width="40" height="120" rx="4" fill="#ffffff"/>
    <text x="350" y="320" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">2025</text>

    <!-- Bar 3 (tallest) -->
    <rect x="390" y="100" width="40" height="200" rx="4" fill="#ffffff"/>
    <text x="410" y="320" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">2026</text>

    <!-- Bar 4 (moderate) -->
    <rect x="450" y="160" width="40" height="140" rx="4" fill="#ffffff"/>
    <text x="470" y="320" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">2027</text>

    <!-- Y-axis -->
    <line x1="250" y1="100" x2="250" y2="300" stroke="#ffffff" stroke-width="2" opacity="0.6"/>

    <!-- Upward arrow -->
    <path d="M 520 280 L 560 240 L 540 240 L 540 180 L 580 180 L 560 160 L 600 200" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>