<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047ab;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots5" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad5)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots5)"/>

  <!-- Gavel and Scales -->
  <g opacity="0.9">
    <!-- Scale - Left -->
    <g transform="translate(280, 200)">
      <!-- Beam -->
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <!-- Fulcrum -->
      <path d="M 0 0 L -20 40 L 20 40 Z" fill="#ffffff"/>
      <!-- Left pan -->
      <rect x="-70" y="-30" width="40" height="30" rx="3" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <!-- Right pan -->
      <rect x="30" y="-30" width="40" height="30" rx="3" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    </g>

    <!-- Gavel - Right -->
    <g transform="translate(520, 200)">
      <!-- Handle -->
      <rect x="-8" y="-40" width="16" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="3"/>
      <!-- Head -->
      <rect x="-35" y="35" width="70" height="20" rx="4" fill="#ffffff"/>
      <!-- Block base -->
      <rect x="-45" y="60" width="90" height="25" rx="4" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    </g>
  </g>
</svg>