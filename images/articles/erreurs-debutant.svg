<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots11" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#grad11)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots11)"/>

  <!-- Checklist with X marks and Stumbling Person -->
  <g opacity="0.9">
    <!-- Checklist -->
    <g transform="translate(280, 180)">
      <!-- List box -->
      <rect x="-50" y="-50" width="100" height="130" rx="5" fill="none" stroke="#ffffff" stroke-width="2"/>

      <!-- Item 1 with X -->
      <circle cx="-35" cy="-30" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="-38" y1="-33" x2="-32" y2="-27" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-32" y1="-33" x2="-38" y2="-27" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-20" y1="-30" x2="30" y2="-30" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

      <!-- Item 2 with X -->
      <circle cx="-35" cy="-5" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="-38" y1="-8" x2="-32" y2="-2" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-32" y1="-8" x2="-38" y2="-2" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-20" y1="-5" x2="30" y2="-5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

      <!-- Item 3 with X -->
      <circle cx="-35" cy="20" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="-38" y1="17" x2="-32" y2="23" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-32" y1="17" x2="-38" y2="23" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-20" y1="20" x2="30" y2="20" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- Stumbling Person -->
    <g transform="translate(520, 200)">
      <!-- Head -->
      <circle cx="0" cy="-25" r="14" fill="#ffffff"/>
      <!-- Surprised face -->
      <circle cx="-4" cy="-27" r="2" fill="#222222"/>
      <circle cx="4" cy="-27" r="2" fill="#222222"/>
      <circle cx="0" cy="-20" r="2.5" fill="#222222"/>

      <!-- Body tilting -->
      <line x1="0" y1="-11" x2="8" y2="10" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

      <!-- Arms flailing -->
      <line x1="8" y1="0" x2="-15" y2="-10" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <line x1="8" y1="0" x2="25" y2="-8" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

      <!-- Legs stumbling -->
      <line x1="8" y1="10" x2="0" y2="35" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <line x1="8" y1="10" x2="20" y2="32" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

      <!-- Motion lines -->
      <line x1="-25" y1="-5" x2="-35" y2="-10" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7" stroke-dasharray="2,2"/>
      <line x1="-20" y1="15" x2="-32" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7" stroke-dasharray="2,2"/>
    </g>
  </g>
</svg>